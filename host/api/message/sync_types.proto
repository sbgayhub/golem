// 45：朋友圈对象
// MomentsObject 朋友圈对象
message MomentsObject {
  optional uint64 id = 1;                                  // ID
  optional string username = 2;                            // 用户名
  optional string nickname = 3;                            // 昵称
  optional uint32 create_time = 4;                         // 创建时间
  optional google.protobuf.StringValue object_description = 5; // 对象描述
  optional uint32 like_flag = 6;                           // 点赞标志
  optional uint32 like_count = 7;                          // 点赞数量
  optional uint32 like_user_count = 8;                     // 点赞用户数量
  repeated CommentInfo like_user_list = 9;                 // 点赞用户列表
  optional uint32 comment_count = 10;                      // 评论数量
  optional uint32 comment_user_count = 11;                 // 评论用户数量
  repeated CommentInfo comment_user_list = 12;             // 评论用户列表
  optional uint32 with_count = 13;                         // 关联数量
  optional uint32 with_user_count = 14;                    // 关联用户数量
  repeated CommentInfo with_user_list = 15;                // 关联用户列表
  optional uint32 extend_flag = 16;                        // 扩展标志
  optional uint32 no_change = 17;                          // 无变化标志
  optional uint32 chatroom_count = 18;                        // 分组数量
  repeated google.protobuf.UInt64Value chatroom_list = 19;    // 分组ID列表
  optional uint32 is_not_rich_text = 20;                   // 是否非富文本
  optional string refer_username = 21;                     // 引用用户名
  optional uint64 refer_id = 22;                           // 引用ID
  optional uint32 black_list_count = 23;                   // 黑名单数量
  repeated base.Buffer black_list = 24;              // 黑名单
  optional uint32 delete_flag = 25;                        // 删除标志
  optional uint32 chatroom_user_count = 26;                   // 分组用户数量
  repeated base.Buffer chatroom_user = 27;              // 分组用户
  repeated base.Buffer object_operation = 28;        // 对象操作数据
  optional RedEnvelops red_envelops = 29;                  // 红包信息
  optional PreDownloadInfo pre_download_info = 30;         // 预下载信息
  optional AppInfo app_info = 31;                          // 应用信息

  // CommentInfo 评论信息
  message CommentInfo {
    optional string username = 1;           // 用户名
    optional string nickname = 2;           // 昵称
    optional uint32 source = 3;             // 来源
    optional uint32 type = 4;               // 类型
    optional string content = 5;            // 内容
    optional uint32 create_time = 6;        // 创建时间
    optional int32 comment_id = 7;          // 评论ID
    optional int32 reply_comment_id = 8;    // 回复评论ID
    optional string reply_username = 9;     // 回复用户名
    optional uint32 is_not_rich_text = 10;  // 是否非富文本
    optional uint64 reply_comment_id2 = 11; // 回复评论ID2
    optional uint64 comment_id2 = 12;       // 评论ID2
    optional uint32 delete_flag = 13;       // 删除标志
    optional uint32 comment_flag = 14;      // 评论标志
  }

  // RedEnvelops 红包信息
  message RedEnvelops {
    optional uint32 reward_count = 1;   // 打赏数量
    optional bytes reward_user_list = 2; // 打赏用户列表
    optional uint32 report_id = 3;      // 上报ID
    optional uint32 report_key = 4;     // 上报密钥
    optional uint32 resource_id = 5;    // 资源ID
  }

  // PreDownloadInfo 预下载信息
  message PreDownloadInfo {
    optional uint32 percent = 1;               // 百分比
    optional uint32 net_type = 2;              // 网络类型
    optional string no_pre_download_range = 3; // 不预下载范围
  }

  // AppInfo 应用信息
  message AppInfo {
    optional string map_poi_id = 1;   // 地图POI ID
    optional uint32 app_id = 2;       // App ID
    optional string username = 3;     // 用户名
    optional string redirect_url = 4; // 重定向URL
    optional uint32 show_type = 5;    // 显示类型
    optional uint32 r_score = 6;      // R分数
  }
}


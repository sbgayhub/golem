syntax = "proto3";

package official;

// OfficialService 公众号服务
service OfficialService {
  // Follow 关注公众号
  rpc Follow(Follow.Request) returns (Follow.Response);
  // Quit 取关公众号
  rpc Quit(Quit.Request) returns (Quit.Response);
  // MpGetA8Key 获取公众号 A8Key
  rpc MpGetA8Key(MpGetA8Key.Request) returns (MpGetA8Key.Response);
  // JSAPIPreVerify JSAPI 预验证
  rpc JSAPIPreVerify(JSAPIPreVerify.Request) returns (JSAPIPreVerify.Response);
  // OauthAuthorize OAuth 授权
  rpc OauthAuthorize(OauthAuthorize.Request) returns (OauthAuthorize.Response);
  // ReadArticle 阅读公众号文章
  rpc ReadArticle(ReadArticle.Request) returns (ReadArticle.Response);
  // LikeArticle 点赞公众号文章
  rpc LikeArticle(LikeArticle.Request) returns (LikeArticle.Response);
}

// BaseResult 通用结果
message BaseResult {
  int32 code = 1; // 返回码
  string message = 2; // 返回消息
}

// Buffer 字节缓冲区
message Buffer {
  uint32 size = 1; // 数据长度
  bytes data = 2; // 数据内容
}

// JSAPIPermissionBitSet JSAPI 权限位集
message JSAPIPermissionBitSet {
  uint32 value1 = 1; // 权限值1
  uint32 value2 = 2; // 权限值2
  uint32 value3 = 3; // 权限值3
  uint32 value4 = 4; // 权限值4
}

// BizScopeInfo 业务授权范围信息
message BizScopeInfo {
  string scope = 1; // 授权范围
  uint32 scope_status = 2; // 授权范围状态
  string scope_description = 3; // 授权范围说明
  uint32 api_count = 4; // API 数量
  repeated string api_list = 5; // API 列表
}

// HttpHeader HTTP 头
message HttpHeader {
  string key = 1; // 键
  string value = 2; // 值
}

// JSAPIResult JSAPI 基础响应
message JSAPIResult {
  int32 code = 1; // 返回码
  string error = 2; // 错误信息
  string json = 3; // 微信响应 JSON
}

// ArticleResult 文章操作结果
message ArticleResult {
  string response_body = 1; // HTTP 响应体
  string cookies = 2; // Cookie
  map<string, string> headers = 3; // 响应头
}

message Follow {
  message Request {
    string appid = 1; // 公众号 AppID
  }
  message Response {
    BaseResult base_result = 1; // 基础结果
    string username = 2; // 公众号用户名
  }
}

message Quit {
  message Request {
    string appid = 1; // 公众号 AppID
  }
  message Response {
    int32 code = 1; // 返回码
    uint32 count = 2; // 操作结果数量
    int32 result_code = 3; // 结果码
    bytes message = 4; // 错误信息内容
  }
}

message MpGetA8Key {
  message Request {
    string url = 1; // 请求 URL
  }
  message Response {
    BaseResult base_result = 1; // 基础结果
    string full_url = 2; // 完整 URL
    string a8_key = 3; // A8 密钥
    string action_code = 4; // 动作码
    string title = 5; // 标题
    string content = 6; // 内容
    JSAPIPermissionBitSet jsapi_permission = 7; // JSAPI 权限位集
    uint32 general_control = 8; // 通用控制值
    string user_name = 9; // 用户名
    string share_url = 15; // 分享 URL
    uint32 scope_count = 16; // 授权范围数量
    repeated BizScopeInfo scope_list = 17; // 授权范围列表
    string antispam_ticket = 18; // 反垃圾票据
    string ssid = 20; // SSID
    string mid = 21; // MID
    uint64 deep_link = 22; // Deep Link
    Buffer jsapi_control_bytes = 23; // JSAPI 控制字节流
    uint32 http_header_count = 24; // HTTP 头数量
    repeated HttpHeader http_header_list = 25; // HTTP 头列表
    string wording = 26; // 文案
    string avatar = 27; // 头像 URL
    Buffer cookie = 28; // Cookie
    string menu_wording = 29; // 菜单文案
  }
}

message JSAPIPreVerify {
  message Request {
    string url = 1; // 页面 URL
    string appid = 2; // 公众号 AppID
    repeated string jsapi_list = 3; // JSAPI 列表
  }
  message Response {
    BaseResult base_result = 1; // 基础结果
    JSAPIResult jsapi_result = 2; // JSAPI 基础响应
    repeated string verify_info_list = 3; // 验证信息列表
    repeated string domain_path_list = 4; // 域名路径列表
    string app_avatar_url = 5; // App 头像 URL
    string app_nickname = 6; // App 昵称
  }
}

message OauthAuthorize {
  message Request {
    string url = 1; // OAuth URL
    string appid = 2; // 公众号 AppID
  }
  message Response {
    BaseResult base_result = 1; // 基础结果
    repeated bytes scope_list = 2; // 授权范围列表
    string app_name = 4; // App 名称
    string app_icon_url = 5; // App 图标 URL
    string redirect_url = 6; // 重定向 URL
    bool is_recent_has_auth = 9; // 最近是否有授权
    bool is_silent_auth = 10; // 是否静默授权
    bool is_call_server_when_confirm = 11; // 确认时是否调用服务器
  }
}

message ReadArticle {
  message Request {
    string url = 1; // 文章 URL
  }
  message Response {
    ArticleResult result = 1; // 文章操作结果
  }
}

message LikeArticle {
  message Request {
    string url = 1; // 文章 URL
  }
  message Response {
    ArticleResult result = 1; // 文章操作结果
  }
}

// 38...43：

// 44：用户信息扩展
// UserInfoExtend 用户信息扩展
message UserInfoExtend {
  optional string brand_list = 2;                  // 我的品牌列表
  optional string message_push_sound = 3;          // 消息推送声音
  optional string voip_push_sound = 4;             // VoIP推送声音
  optional uint32 big_chatroom_size = 5;              // 大群大小
  optional uint32 big_chatroom_quota = 6;             // 大群配额
  optional uint32 big_chatroom_invite = 7;            // 大群邀请
  optional string safe_mobile = 8;                 // 安全手机
  optional string big_avatar_url = 9;              // 大头像URL
  optional string small_avatar_url = 10;           // 小头像URL
  optional uint32 main_account_type = 11;          // 主账号类型
  optional google.protobuf.StringValue extend_xml = 12; // 扩展XML
  optional SafeDeviceList safe_device_list = 13;   // 安全设备列表
  optional uint32 safe_device = 14;                // 安全设备
  optional uint32 grayscale_flag = 15;             // 灰度标志
  optional string google_contact_name = 16;        // Google联系人名称
  optional string id_card_num = 17;                // 身份证号
  optional string real_name = 18;                  // 真实姓名
  optional string registry_country = 19;           // 注册国家
  optional string bbp_pid = 20;                    // BBPPID
  optional string bbp_in = 21;                     // BBPIN
  optional string bbm_nick_name = 22;              // BBM昵称
  optional LinkedinContactItem linkedin_contact_item = 23; // LinkedIn联系人项
  optional string kf_info = 24;                    // 客服信息
  optional PatternLockInfo pattern_lock_info = 25; // 图案锁信息
  optional string security_device_id = 26;         // 安全设备ID

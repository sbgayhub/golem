  optional uint32 wallet_region = 29;              // 钱包地区
  optional uint64 extend_status = 30;              // 扩展状态
  optional string f2f_push_sound = 31;             // 面对面推送声音
  optional uint32 user_status = 32;                // 用户状态
  optional uint64 pay_setting = 33;                // 支付设置
}


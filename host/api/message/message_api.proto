syntax = "proto3";

package message.api;

option go_package = "github.com/sbgayhub/golem/host/api/message;messageapi";

// ==================== 同步消息 ====================

// SyncMessageRequest 同步消息请求
message SyncMessageRequest {
  uint32 selector = 1; // 同步选择器
}

// ==================== 通用响应 ====================

// OperateResponse 通用操作响应（字段编号与 SDK proto 对齐）
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 发送文本消息 ====================

// SendMessageResponse 发送消息响应（字段编号与 SDK proto 对齐）
message SendMessageResponse {
  uint64 new_msg_id = 1;     // 新消息 ID
  uint64 client_msg_id = 2;  // 客户端消息 ID
  uint32 create_time = 3;    // 创建时间
}

// ==================== 发送媒体消息 ====================

// UploadImageResponse 上传图片响应（字段编号与 SDK proto 对齐）
message UploadImageResponse {
  string aes_key = 1;     // AES 密钥
  string file_id = 2;     // 文件 ID
  uint64 new_msg_id = 3;  // 新消息 ID
  uint32 create_time = 4; // 创建时间
  uint32 file_size = 5;   // 文件大小
  string file_md5 = 6;    // 文件 MD5
}

// UploadVideoResponse 上传视频响应（字段编号与 SDK proto 对齐）
message UploadVideoResponse {
  string aes_key = 1;   // AES 密钥
  string file_id = 2;   // 文件 ID
  uint32 file_size = 3; // 文件大小
  uint32 thumb_size = 4; // 缩略图大小
  string file_md5 = 5;  // 文件 MD5
}

// UploadVoiceResponse 上传语音响应（字段编号与 SDK proto 对齐）
message UploadVoiceResponse {
  string aes_key = 1;     // AES 密钥
  string file_id = 2;     // 文件 ID
  uint64 new_msg_id = 3;  // 新消息 ID
  uint32 create_time = 4; // 创建时间
}

// UploadEmojiResponse 上传表情响应（字段编号与 SDK proto 对齐）
message UploadEmojiResponse {
  string md5 = 1;         // 表情 MD5
  uint64 new_msg_id = 2;  // 新消息 ID
  uint32 create_time = 3; // 创建时间
}

// ==================== 发送应用消息 ====================

// SendAppMessageResponse 发送应用消息响应（字段编号与 SDK proto 对齐）
message SendAppMessageResponse {
  uint64 new_msg_id = 1;     // 新消息 ID
  uint64 client_msg_id = 2;  // 客户端消息 ID
  uint32 create_time = 3;    // 创建时间
}

// ==================== 撤回消息 ====================

// RevokeMessageResponse 撤回消息响应（字段编号与 SDK proto 对齐）
message RevokeMessageResponse {
  int32 code = 1;     // 状态码
  string message = 2; // 提示信息
}

// ==================== 下载消息资源 ====================

// DownloadImageResponse 下载图片响应（字段编号与 SDK proto 对齐）
message DownloadImageResponse {
  bytes data = 1; // 图片数据
}

// DownloadVideoResponse 下载视频响应（字段编号与 SDK proto 对齐）
message DownloadVideoResponse {
  bytes data = 1; // 视频数据
}

// DownloadVoiceResponse 下载语音响应（字段编号与 SDK proto 对齐）
message DownloadVoiceResponse {
  bytes data = 1; // 语音数据
}

// DownloadFileResponse 下载文件响应（字段编号与 SDK proto 对齐）
message DownloadFileResponse {
  bytes data = 1; // 文件数据
}
